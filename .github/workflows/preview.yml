name: Preview

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install poppler-utils
        run: sudo apt-get install -y poppler-utils

      - name: Build
        run: go build -o pdf2md ./cmd/pdf2md

      - name: Generate HTML from test fixtures
        run: |
          mkdir -p output
          for f in test/*.html; do
            ./pdf2md --format html "$f" > "output/$(basename "${f%.html}.rendered.html")"
          done

      - name: Generate JSON from test fixtures
        run: |
          for f in test/*.html; do
            ./pdf2md --format json --pretty "$f" > "output/$(basename "${f%.html}.json")"
          done

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ./output --project-name pdf2md-preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
