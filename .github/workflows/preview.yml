name: Preview

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install poppler-utils
        run: sudo apt-get install -y poppler-utils

      - name: Build
        run: go build -o pdf2md ./cmd/pdf2md

      - name: Run tests
        run: go test ./...

      - name: Generate HTML from test fixtures
        run: |
          mkdir -p output
          for bbox in test/*.bbox; do
            name=$(basename "${bbox%.bbox}")
            pdf="test/${name}.pdf"
            if [ -f "$pdf" ]; then
              ./pdf2md -bbox-cache "$bbox" --format html "$pdf" > "output/${name}.rendered.html"
            fi
          done

      - name: Generate JSON from test fixtures
        run: |
          for bbox in test/*.bbox; do
            name=$(basename "${bbox%.bbox}")
            pdf="test/${name}.pdf"
            if [ -f "$pdf" ]; then
              ./pdf2md -bbox-cache "$bbox" --format json --pretty "$pdf" > "output/${name}.json"
            fi
          done

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy ./output --project-name pdf2md-preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
